version: '3'

services:

  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/NuovaPassword123
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
      - ./import:/import

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "3001:3001"
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  neo4j_data: