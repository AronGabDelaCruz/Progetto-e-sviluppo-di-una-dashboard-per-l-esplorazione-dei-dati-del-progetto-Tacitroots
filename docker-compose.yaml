services:

  # Carica il dump nel volume PRIMA che il server Neo4j parta, una sola volta.
  # Se il database e' gia' presente nel volume, salta il caricamento: questo
  # evita sia la corruzione/quarantena (load mentre il server tiene i file
  # aperti) sia l'errore "database is in use" a ogni riavvio.
  # Per ricaricare da zero un nuovo dump: docker-compose down -v && up.
  neo4j-init:
    image: neo4j:5-enterprise
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - ./import:/import
      - neo4j_data:/data
    entrypoint: >
      bash -c "
      if [ -d /data/databases/neo4j ]; then
        echo 'Database neo4j gia presente nel volume: caricamento saltato.';
      else
        echo 'Volume vuoto: carico il dump...';
        neo4j-admin database load neo4j --from-path=/import --overwrite-destination=true;
      fi
      "

  neo4j:
    image: neo4j:5-enterprise
    container_name: neo4j

    depends_on:
      neo4j-init:
        condition: service_completed_successfully

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

    volumes:
      - neo4j_data:/data

    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 -d neo4j 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "3001:3001"

    depends_on:
      neo4j:
        condition: service_healthy

    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      NEO4J_DATABASE: neo4j
      PORT: 3001

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      # Bersaglio del proxy /api del dev server (vedi frontend/src/setupProxy.js)
      BACKEND_URL: http://backend:3001

volumes:
  neo4j_data:
